<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Contacto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffb347, #ffd700);
    min-height:100vh;
    padding-top:90px;
}

/* TITULO */
h1{
    text-align:center;
    color:#072649;
    margin-bottom:30px;
    font-size:40px;
}

/* CONTENEDOR */
.contenedor{
    width:90%;
    max-width:700px;
    margin:auto;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FORM */
ul{
    list-style:none;
}

li{
    margin:20px 0;
}

label{
    display:block;
    margin-bottom:8px;
    color:#072649;
    font-size:18px;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

textarea{
    height:120px;
    resize:none;
}

/* BOTONES */
button,
.boton{
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    background-color:#072649;
    color:white;
    border:none;
    border-radius:10px;
    text-decoration:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover,
.boton:hover{
    background-color:#0ea5e9;
}

/* NAV */
nav{
    background-color:#072649;
    padding:15px;
    position:fixed;
    top:0;
    left:0;
    width:100%;
}

nav ul{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    list-style:none;
}

nav ul li{
    margin:5px 15px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

nav ul li a:hover{
    color:yellow;
}

</style>
</head>

<body>

<nav>
<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="presentacion.html">Presentación</a></li>
<li><a href="academia.html".html">Académia</a></li>
<li><a href="hobbies.html">Hobbies</a></li>
<li><a href="referencias.html">Habilidades</a></li>
<li><a href="registro.html">Registro</a></li>
</ul>
</nav>

<h1>Registro de Contacto</h1>

<div class="contenedor">

<div class="card">

<form action="https://formspree.io/f/xjglavye" method="POST">

<input type="hidden" name="_subject" value="Nuevo mensaje desde tu CV">
<input type="hidden" name="_captcha" value="false">

<ul>

<li>
<label>Nombre:</label>
<input type="text" name="name" required>
</li>

<li>
<label>Correo:</label>
<input type="email" name="email" required>
</li>

<li>
<label>Mensaje:</label>
<textarea name="message" required></textarea>
</li>

<li>
<button type="submit">Enviar</button>
</li>

</ul>

</form>

<a href="index.html" class="boton">⬅ Volver al Inicio</a>

</div>

</div>

</body>
</html>
